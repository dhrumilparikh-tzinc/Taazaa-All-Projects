version: "3.9"

services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
      - redis
      - chromadb
    volumes:
      - ./:/app
      - uploads:/tmp/geminirag_uploads

  worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    depends_on:
      - postgres
      - redis
      - chromadb
    volumes:
      - ./:/app
      - uploads:/tmp/geminirag_uploads

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: geminirag
      POSTGRES_PASSWORD: geminirag
      POSTGRES_DB: geminirag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chromadata:/chroma/chroma

volumes:
  pgdata:
  chromadata:
  uploads:
