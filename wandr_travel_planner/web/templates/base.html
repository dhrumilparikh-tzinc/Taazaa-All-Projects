<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Wandr{% endblock %} — AI Travel Planner</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:     '#4f378a',
            'primary-lt':'#7c5db7',
            'cta-teal':  '#0F6E56',
            surface:     '#fdf7ff',
            'surface-dk':'#ede7f6',
            'on-surface':'#1c1b1f',
            'on-variant':'#49454f',
            divider:     '#cac4d0',
            error:       '#b3261e',
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'Georgia', 'serif'],
            sans:  ['"DM Sans"', 'system-ui', 'sans-serif'],
          },
          keyframes: {
            'pulse-ring': {
              '0%':   { transform: 'scale(0.8)', opacity: '1' },
              '100%': { transform: 'scale(2.2)', opacity: '0' },
            }
          },
          animation: {
            'pulse-ring': 'pulse-ring 1.4s cubic-bezier(0.4,0,0.6,1) infinite',
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">

  {% block head_extra %}{% endblock %}
</head>
<body class="h-full bg-surface font-sans text-on-surface antialiased">
  {% block content %}{% endblock %}
</body>
</html>
